<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Autograder 2026</title>
  <meta http-equiv="ngrok-skip-browser-warning" content="true"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?ngrok-skip-browser-warning=true"/>
</head>
<body>
  <div id="banner">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" id="banner-logo"/>
  </div>
  <div id="banner-spacer"></div>

  <h1>Welcome back, {{ session.get('student_name', 'Student') }}</h1>
  <h2>{{ session.get('assignment_name', 'Assignment') }}</h2>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">Upload File</div>
    <p>Drag & drop a file here, or browse</p>
    <input type="file" id="file-input" multiple accept=".py, .pdf"/>
  </div>

  <div id="status"></div>
  <div class="file-list" id="file-list"></div>

  <!-- Grade Button -->
  <button id="grade-btn" onclick="runGrader()">⚙ Grade Assignment</button>
  <div id="grade-status"></div>

  <!-- Results Section (hidden until graded) -->
  <div id="results-section" style="display:none;">

    <div class="results-header">
      <h3>Test Results</h3>
      <div class="summary">
        <span class="summary-item">Total: <strong id="r-total">0</strong></span>
        <span class="divider">|</span>
        <span class="summary-item passed">Passed: <strong id="r-passed">0</strong></span>
        <span class="divider">|</span>
        <span class="summary-item failed">Failed: <strong id="r-failed">0</strong></span>
        <span class="divider">|</span>
        <span class="summary-item">Score: <strong id="r-score">0 / 0</strong></span>
      </div>
    </div>

    <div class="grid-container">
      <div class="grid-header">
        <span>Test Name</span>
        <span>Status</span>
        <span>Output</span>
      </div>
      <div id="grid-body"></div>
    </div>

    <!-- Feedback Section -->
    <div id="feedback-section" style="display:none;">
      <h3>Feedback</h3>
      <div id="feedback-text"></div>
    </div>

    <!-- Submit Section -->
    <div id="submit-section" style="display:none;">
      <button id="submit-btn" onclick="submitAssignment()">Submit Assignment</button>
      <div id="submit-status"></div>
    </div>

  </div>

  <script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const status = document.getElementById('status');
  const fileList = document.getElementById('file-list');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files, false);
  });

  fileInput.addEventListener('change', () => {
    handleFiles(fileInput.files, fileInput._reupload || false);
    fileInput._reupload = false;
    fileInput.value = '';
  });

  async function handleFiles(files, reupload = false) {
    for (const file of files) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['py', 'pdf'].includes(ext)) {
        status.className = 'error';
        status.textContent = `"${file.name}" is not allowed. Only .py and .pdf files.`;
        addFileItem(file.name, file.size, false, null, false);
        continue;
      }

      status.className = '';
      status.textContent = `Uploading ${file.name}...`;
      const formData = new FormData();
      formData.append('file', file);
      formData.append('reupload', reupload ? 'true' : 'false');
      formData.append('original_name', reupload ? fileInput._originalName : '');


      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        addFileItem(file.name, file.size, data.success, data.error, reupload);
        status.className = data.success ? '' : 'error';
        status.textContent = data.success
          ? reupload ? `"${file.name}"replaced successfully` : `Saved`
          : `${data.error}`;
      } catch {
        addFileItem(file.name, file.size, false, null, reupload);
        status.className = 'error';
        status.textContent = 'Could not reach server';
      }
    }
  }

  function addFileItem(name, size, success, error = null, reupload = false) {
    // If re-uploading, remove the old entry for this file if it exists
    if (reupload) {
      const existing = document.querySelector(`.file-item[data-name="${name}"]`);
      if (existing) existing.remove();
    }

    const item = document.createElement('div');
    item.className = 'file-item';
    item.dataset.name = name;
    item.innerHTML = `
      <span class="name">${name}</span>
      <span class="size">${(size / 1024).toFixed(1)} KB</span>
      <span class="badge ${success ? '' : 'error'}">${success ? (reupload ? 'Replaced' : 'Saved') : 'Failed'}</span>
      ${success ? `<button class="reupload-btn" onclick="triggerReupload('${name}')">Replace</button>` : ''}
    `;
    fileList.prepend(item);
  }

  function triggerReupload(originalName) {
  fileInput._reupload = true;
  fileInput._originalName = originalName;
  fileInput.click();
}

async function runGrader() {
  const btn = document.getElementById('grade-btn');
  const gradeStatus = document.getElementById('grade-status');
  const resultsSection = document.getElementById('results-section');

  btn.disabled = true;
  btn.textContent = 'Grading...';
  gradeStatus.className = '';
  gradeStatus.textContent = 'Running autograder, please wait...';

  try {
    const res = await fetch('/grade', { method: 'POST' });
    const data = await res.json();

    if (!data.success) {
      gradeStatus.className = 'error';
      gradeStatus.textContent = '✗ Grading failed: ' + data.error;
      btn.disabled = false;
      btn.textContent = '⚙ Grade Assignment';
      return;
    }

    // Fill summary
    document.getElementById('r-total').textContent  = data.total;
    document.getElementById('r-passed').textContent = data.passed;
    document.getElementById('r-failed').textContent = data.failed;

    document.getElementById('r-score').textContent = `${data.total_score} / ${data.total_possible}`;

    // Fill grid
    const gridBody = document.getElementById('grid-body');
    gridBody.innerHTML = '';
    data.tests.forEach(test => {
      const row = document.createElement('div');
      row.className = `grid-row ${test.status}`;
      row.innerHTML = `
        <span class="test-name">${test.name}</span>
        <span class="test-status ${test.status}">${test.status}</span>
        <span class="test-output">${test.output || '—'}</span>
      `;
      gridBody.appendChild(row);
    });

    // Show feedback
    if (data.feedback) {
      document.getElementById('feedback-text').textContent = data.feedback;
      document.getElementById('feedback-section').style.display = 'block';
    }

    resultsSection.style.display = 'block';
    gradeStatus.textContent = 'Grading complete!';
    btn.textContent = 'Re-grade Assignment';
    document.getElementById('submit-section').style.display = 'block';
    btn.disabled = false;

  } catch {
    gradeStatus.className = 'error';
    gradeStatus.textContent = 'Could not reach server.';
    btn.disabled = false;
    btn.textContent = 'Grade Assignment';
  }
}

async function submitAssignment() {
  const btn = document.getElementById('submit-btn');
  const submitStatus = document.getElementById('submit-status');

  btn.disabled = true;
  btn.textContent = 'Submitting...';
  submitStatus.style.color = '';
  submitStatus.textContent = '';

  try {
    const res = await fetch('/submit', { method: 'POST' });
    const data = await res.json();

    if (!data.success) {
      submitStatus.style.color = '#a17f40';
      submitStatus.textContent = 'Error: ' + data.error;
      btn.disabled = false;
      btn.textContent = 'Submit Assignment';
      return;
    }

    submitStatus.style.color = '#a17f40';
    submitStatus.textContent = data.dry_run
      ? 'Not submitted to Canvas yet.'
      : '✓ ' + data.message;
    btn.textContent = 'Submitted';
    // Keep button disabled after successful submission so student can't double submit

  } catch {
    submitStatus.style.color = '#a17f40';
    submitStatus.textContent = 'Could not reach server.';
    btn.disabled = false;
    btn.textContent = 'Submit Assignment';
  }
}

</script>
</body>
</html>
